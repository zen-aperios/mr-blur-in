<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MR Blur In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo">
    <section>
      <p class="eyebrow">Load animation (`.js-blur-words`)</p>
      <h1 class="js-blur-words">Blur words that reveal cleanly on page load.</h1>
    </section>

    <section class="spacer">
      <p>Scroll down</p>
    </section>

    <section>
      <p class="eyebrow">Scroll animation (`.blur-in`)</p>
      <p class="blur-in">
        Use the same lightweight classes in any Webflow project and animate words as they enter viewport.
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
